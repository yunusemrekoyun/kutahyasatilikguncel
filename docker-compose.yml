# Lokal geliştirme veritabanı (Postgres).
# Canlıda Supabase kullanılacak; bu yalnızca yerel geliştirme içindir.
# Başlat:  docker compose up -d
# Durdur:  docker compose down   (veriyi silmek için: docker compose down -v)
services:
  postgres:
    image: postgres:16-alpine
    container_name: kutahya-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: kutahya
      POSTGRES_PASSWORD: kutahya
      POSTGRES_DB: kutahya
    ports:
      - "5433:5432"
    volumes:
      - kutahya-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kutahya -d kutahya"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: kutahya-redis
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  kutahya-pgdata:
